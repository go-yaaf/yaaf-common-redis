# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Test and Publish
env:
  major: 1
  minor: 2
  # Toggle the "Vulnerability scan" step: 'true' to run it, 'false' to skip it.
  run_vuln_scan: 'false'
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'   # always resolve to the latest 1.25 patch (>= 1.25.12) for stdlib security fixes

      - name: Get dependencies
        run: go get -v -t ./...

      - name: Vet
        run: go vet ./...

      - name: Vulnerability scan
        if: ${{ env.run_vuln_scan == 'true' }}
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest

          # Policy: FAIL on reachable vulnerabilities in this module's own code or its
          # dependencies (we can fix those by bumping a dependency). WARN — but don't fail —
          # on standard-library vulnerabilities: those are remediated only by a Go toolchain
          # upgrade, which the '1.25.x' go-version above picks up automatically as soon as a
          # patched release is published (e.g. GO-2026-5856, fix go1.25.12, unreleased at time
          # of writing). This keeps CI honest about dependency risk without blocking on stdlib
          # CVEs that have no released fix yet.
          govulncheck -format json ./... > govulncheck.json || true
          govulncheck ./... || true   # human-readable log in the CI output

          SEL='select(.finding).finding | select(.trace[0].function != null)'
          STD=$(jq -r "$SEL | select(.trace[0].module==\"stdlib\") | .osv" govulncheck.json | sort -u)
          DEP=$(jq -r "$SEL | select(.trace[0].module!=\"stdlib\") | .osv" govulncheck.json | sort -u)

          for id in $STD; do echo "::warning::Standard-library vulnerability $id — fixed by a Go toolchain upgrade (auto-applied via go-version 1.25.x)"; done
          if [ -n "$DEP" ]; then
            for id in $DEP; do echo "::error::Reachable dependency/code vulnerability $id — update the affected module"; done
            exit 1
          fi
          echo "No reachable dependency or first-party vulnerabilities."

      - name: Test
        run: go test -v ./...

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ env.major }}.${{ env.minor }}.${{ github.run_number }}
          release_name: v${{ env.major }}.${{ env.minor }}.${{ github.run_number }}
          draft: false
          prerelease: false

      - name: Update Go package repository
        run: curl https://proxy.golang.org/github.com/go-yaaf/yaaf-common-redis/@v/v${{ env.major }}.${{ env.minor }}.${{ github.run_number }}.info
        env:
          GOPROXY: proxy.golang.org